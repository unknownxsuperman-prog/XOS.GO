<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XOS.go</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap">
    <style>
        :root {
            --bg: #000000;
            --accent: #007aff;
            --card: #0a0a0a;
            --border: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .xos-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            width: 80%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            transform: translateY(20px);
            animation: slideUp 0.6s ease forwards;
        }

        .brand-logo {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
        }

        .brand-logo span { color: var(--accent); }

        .dev-badge {
            font-size: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 4px;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="xos-card">
        <div class="brand-logo">XOS<span>.go</span></div>
        <div style="margin-bottom: 20px;">Sovereign Transit Node</div>
        <div class="dev-badge">Status: Online | P=1.0</div>
    </div>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log("XOS.go System Active"))
                .catch(err => console.log("System Error", err));
        }
    </script>
</body>
</html>
