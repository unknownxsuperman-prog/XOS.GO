<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XOS.go | Sovereign Transit</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#007aff">
    <link rel="apple-touch-icon" href="./xosgo.png">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap">

    <style>
        :root {
            --bg: #000000;
            --accent: #007aff;
            --card: #0a0a0a;
            --border: #1a1a1a;
            --glass: rgba(10, 10, 10, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Subtle center glow for depth */
            background: radial-gradient(circle at center, #050505 0%, #000000 100%);
        }

        /* xos1 Glassmorphic Utility Card */
        .xos-container {
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 2.5rem;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            
            /* xos1 Slide-up Animation */
            transform: translateY(20px);
            opacity: 0;
            animation: xos-launch 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .brand {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -3px;
            margin-bottom: 0.2rem;
            user-select: none;
        }

        .brand span {
            color: var(--accent);
        }

        .subtitle {
            font-weight: 300;
            color: #666;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .badge-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        /* xos1 Developer Badge (8px, tracked-out) */
        .badge {
            font-size: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 4px;
            color: #444;
        }

        .badge.active {
            color: var(--accent);
            border-color: rgba(0, 122, 255, 0.2);
        }

        /* Action Button with Active Scale State */
        .btn-go {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 14px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.2);
        }

        .btn-go:active {
            transform: scale(0.96); /* xos1 active state */
        }

        @keyframes xos-launch {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Atmospheric Glow */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.05;
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="xos-container">
        <div class="brand">XOS<span>.go</span></div>
        <p class="subtitle">Sovereign Position Engine</p>
        
        <div class="badge-row">
            <div class="badge active">Node: HRP-583131</div>
            <div class="badge">P=1.0 Active</div>
        </div>

        <button class="btn-go" onclick="runKernel()">INITIALIZE TRAVEL</button>
    </div>

    <script>
        // Registration using Relative Anchor
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Kernel Online:', reg.scope))
                    .catch(err => console.error('Kernel Fault:', err));
            });
        }

        function runKernel() {
            // Trigger for future a*a matrix calculations
            console.log("XOS.go: Initializing local position matrix...");
        }
    </script>
</body>
</html>
